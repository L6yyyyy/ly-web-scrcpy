<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LY Web Scrcpy</title>
<style>
  body{background:#1e1e2e;color:white;padding:30px;font-family:Arial}
  .box{max-width:800px;margin:auto;background:#2d2d3f;padding:25px;border-radius:12px}
  input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:0}
  input{background:#3d3d5f;color:white}
  button{background:#7d5afc;color:white;font-size:16px}
  #log{margin-top:10px;color:#ccc}
  video{width:100%;background:#000;border-radius:8px;margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <h2>LY Web Scrcpy 安卓控制</h2>
  <input id="ip" placeholder="输入设备IP:端口 如 192.168.1.5:37291">
  <button onclick="connect()">连接设备</button>
  <div id="log"></div>
  <video id="video" autoplay playsinline></video>
</div>

<script>
let ws;
function connect() {
  let ip = document.getElementById("ip").value;
  if(!ip) return alert("请输入IP");
  log("连接中...");

  ws = new WebSocket("ws://"+location.host);
  ws.onopen = () => {
    ws.send(JSON.stringify({action:"connect",ip:ip}));
  };
  ws.onmessage = (e) => {
    let msg = JSON.parse(e.data);
    log(msg.text || msg.error || "消息："+e.data);
  };
  ws.onerror = () => log("连接失败");
}

function log(text){
  document.getElementById("log").innerText = text;
}
</script>
</body>
</html>
